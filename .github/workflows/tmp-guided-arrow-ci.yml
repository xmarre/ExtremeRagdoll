name: Temporary Guided Arrow Compiler
on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.head_ref, 'tmp/guided-arrow-')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Materialize source
        shell: pwsh
        run: |
          $raw = Get-Content -Raw '.github/workflows/tmp-guided-arrow-build.yml'
          $match = [regex]::Match($raw, "@'\r?\n(?<b64>[A-Za-z0-9+/=]+)\r?\n'@")
          if (-not $match.Success) { throw 'Embedded source archive not found' }
          [IO.File]::WriteAllBytes('guided-arrow-src.tar.gz', [Convert]::FromBase64String($match.Groups['b64'].Value))
          tar -xzf guided-arrow-src.tar.gz
      - name: Restore
        shell: pwsh
        run: dotnet restore GuidedArrow/Source/GuidedArrow.csproj
      - name: Build
        id: compile
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet build GuidedArrow/Source/GuidedArrow.csproj -c Release --no-restore --nologo 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { "BUILD_FAILED=1" | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-compiler-log
          path: build.log
      - name: Package
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package/GuidedArrow/bin/Win64_Shipping_Client | Out-Null
          Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll package/GuidedArrow/bin/Win64_Shipping_Client/
          if (Test-Path GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb) { Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb package/GuidedArrow/bin/Win64_Shipping_Client/ }
          Copy-Item GuidedArrow/SubModule.xml package/GuidedArrow/
          Copy-Item GuidedArrow/README.txt package/GuidedArrow/
          New-Item -ItemType Directory -Force package/GuidedArrow/Source | Out-Null
          Copy-Item GuidedArrow/Source/* package/GuidedArrow/Source/ -Recurse
          Compress-Archive -Path package/GuidedArrow -DestinationPath GuidedArrow-v1.0.0-Bannerlord-1.3.15.zip -Force
      - name: Upload package
        if: env.BUILD_FAILED != '1'
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.0-Bannerlord-1.3.15
          path: |
            GuidedArrow-v1.0.0-Bannerlord-1.3.15.zip
            package/GuidedArrow/**
      - name: Fail on compiler errors
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: exit 1
