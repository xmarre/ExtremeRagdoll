name: Temporary Guided Arrow v1.0.7 Compiler
on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.head_ref, 'tmp/guided-arrow-v107-build')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Reconstruct and verify source
        shell: pwsh
        run: |
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          $parts = Get-ChildItem 'GuidedArrow/SourceParts/GuidedArrowBehavior.part*' | Sort-Object Name
          if ($parts.Count -ne 8) { throw "Expected 8 v1.0.5 source parts, found $($parts.Count)" }
          $text = ''
          foreach ($part in $parts) { $text += (Get-Content -Raw $part.FullName).Replace("`r`n", "`n") }
          [IO.File]::WriteAllText('GuidedArrow/Source/GuidedArrowBehavior.cs', $text, $utf8)
          $baseHash = (Get-FileHash 'GuidedArrow/Source/GuidedArrowBehavior.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($baseHash -ne '6b0146db647ccb1c1f4b271c3ec2bdaf0ac817fbea558f93d52acc792c012d9c') { throw "v1.0.5 source mismatch: $baseHash" }

          $v106Script = 'GuidedArrow/apply_v106.py'
          $scriptText = (Get-Content -Raw $v106Script).Replace("`r`n", "`n")
          $scriptText = $scriptText.Replace('1ba687abc03afe518221ae5fbe553608052bdc382621e711290760c5d2e48264', 'cf2a9561517631b42e31165db1c185d67e2240c6315bc7f17ab72e56f41fff23')
          [IO.File]::WriteAllText($v106Script, $scriptText, $utf8)
          python $v106Script
          if ($LASTEXITCODE -ne 0) { throw "v1.0.6 source patch failed with exit code $LASTEXITCODE" }
          $v106Hash = (Get-FileHash 'GuidedArrow/Source/GuidedArrowBehavior.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($v106Hash -ne 'cf2a9561517631b42e31165db1c185d67e2240c6315bc7f17ab72e56f41fff23') { throw "v1.0.6 source mismatch: $v106Hash" }
          if ((Get-FileHash 'GuidedArrow/Source/Settings.cs' -Algorithm SHA256).Hash.ToLowerInvariant() -ne 'bd231c7751cd0511a60adec360ba15e322637f800afdb36f93817341f963ec5a') { throw 'v1.0.6 Settings mismatch' }
          if ((Get-FileHash 'GuidedArrow/Source/GuidedArrow.csproj' -Algorithm SHA256).Hash.ToLowerInvariant() -ne '5ce628ba15e9e3f99b07faa12feeca0adffd3f8d3046daeaab89c43e7efe5440') { throw 'v1.0.6 project mismatch' }
          if ((Get-FileHash 'GuidedArrow/SubModule.xml' -Algorithm SHA256).Hash.ToLowerInvariant() -ne '120cbca983c7cd859511e182e1a51c26ca162f9883fa8e9433d52341e9c278de') { throw 'v1.0.6 SubModule mismatch' }

          $patchParts = Get-ChildItem 'GuidedArrow/PatchParts/v107_all.patch.part*' | Sort-Object Name
          if ($patchParts.Count -ne 8) { throw "Expected 8 v1.0.7 patch parts, found $($patchParts.Count)" }
          $patchText = ''
          foreach ($part in $patchParts) { $patchText += (Get-Content -Raw $part.FullName).Replace("`r`n", "`n") }
          [IO.File]::WriteAllText('GuidedArrow/v107_all.patch', $patchText, $utf8)
          $patchHash = (Get-FileHash 'GuidedArrow/v107_all.patch' -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "Transport patch SHA-256: $patchHash"
          git apply --check --whitespace=nowarn GuidedArrow/v107_all.patch
          if ($LASTEXITCODE -ne 0) { throw "v1.0.7 patch check failed with exit code $LASTEXITCODE" }
          git apply --whitespace=nowarn GuidedArrow/v107_all.patch
          if ($LASTEXITCODE -ne 0) { throw "v1.0.7 patch apply failed with exit code $LASTEXITCODE" }

          $behaviorHash = (Get-FileHash 'GuidedArrow/Source/GuidedArrowBehavior.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          $settingsHash = (Get-FileHash 'GuidedArrow/Source/Settings.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          $projectHash = (Get-FileHash 'GuidedArrow/Source/GuidedArrow.csproj' -Algorithm SHA256).Hash.ToLowerInvariant()
          $submoduleHash = (Get-FileHash 'GuidedArrow/SubModule.xml' -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "GuidedArrowBehavior.cs SHA-256: $behaviorHash"
          Write-Host "Settings.cs SHA-256: $settingsHash"
          Write-Host "GuidedArrow.csproj SHA-256: $projectHash"
          Write-Host "SubModule.xml SHA-256: $submoduleHash"
          if ($behaviorHash -ne '291db38f4598c34768f5a0b7c4585cbe726b0d4bade267288f486ba879866165') { throw "v1.0.7 controller mismatch: $behaviorHash" }
          if ($settingsHash -ne 'c55fa9e584442f0368de124a9c29f951af63d89abc545bfd600c6f43dc64c4d1') { throw "v1.0.7 Settings mismatch: $settingsHash" }
          if ($projectHash -ne 'a0338c3def7225d6d35a5338423aef1e9d9bd5e685054181e9332c8cf927c50c') { throw "v1.0.7 project mismatch: $projectHash" }
          if ($submoduleHash -ne 'e2edeb55f263edd6097e40a74c7cb0e87eb716abdaeaf305fedb450ca7a6cd81') { throw "v1.0.7 SubModule mismatch: $submoduleHash" }
      - name: Restore
        shell: pwsh
        run: dotnet restore GuidedArrow/Source/GuidedArrow.csproj
      - name: Build
        id: compile
        continue-on-error: true
        shell: pwsh
        run: |
          & dotnet build GuidedArrow/Source/GuidedArrow.csproj -c Release --no-restore --nologo *> build.log
          $exitCode = $LASTEXITCODE
          Get-Content build.log
          if ($exitCode -ne 0) { 'BUILD_FAILED=1' | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.7-compiler-log
          path: build.log
      - name: Package
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        run: |
          $module = 'package/GuidedArrow'
          New-Item -ItemType Directory -Force "$module/bin/Win64_Shipping_Client" | Out-Null
          New-Item -ItemType Directory -Force "$module/Source" | Out-Null
          New-Item -ItemType Directory -Force "$module/GUI/Prefabs" | Out-Null
          Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll "$module/bin/Win64_Shipping_Client/"
          if (Test-Path GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb) { Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb "$module/bin/Win64_Shipping_Client/" }
          Copy-Item GuidedArrow/SubModule.xml $module/
          Copy-Item GuidedArrow/Source/*.cs "$module/Source/"
          Copy-Item GuidedArrow/Source/GuidedArrow.csproj "$module/Source/"
          Copy-Item GuidedArrow/GUI/Prefabs/*.xml "$module/GUI/Prefabs/"
          Compress-Archive -Path $module -DestinationPath GuidedArrow-v1.0.7-Bannerlord-1.3.15-Proximity-Time-Dilation.zip -Force
      - name: Upload package
        if: env.BUILD_FAILED != '1'
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.7-Bannerlord-1.3.15-Proximity-Time-Dilation
          path: GuidedArrow-v1.0.7-Bannerlord-1.3.15-Proximity-Time-Dilation.zip
      - name: Fail on compiler errors
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: exit 1
