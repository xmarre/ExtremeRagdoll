name: Temporary Guided Arrow v1.0.12 Compiler

on:
  pull_request:
    paths:
      - 'GuidedArrow/.v112-compile-trigger'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Reconstruct exact v1.0.11 source baseline
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parts = Get-ChildItem 'GuidedArrow/v109_payload/part*.txt' | Sort-Object Name
          if ($parts.Count -ne 5) { throw "Expected 5 v1.0.9 payload parts, found $($parts.Count)." }
          $encoded = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes('v109.zip', [Convert]::FromBase64String($encoded))
          Expand-Archive -Path 'v109.zip' -DestinationPath 'v112src' -Force
          python -c "import base64,gzip,pathlib; names=['v110.patch','slot-fix.patch','visibility-fix.patch','v111.patch']; src=['GuidedArrow/v110.patch.gz.b64','GuidedArrow/v110-slot-fix.patch.gz.b64','GuidedArrow/v110-public-visibility-fix.patch.gz.b64','GuidedArrow/v111.patch.gz.b64']; [pathlib.Path(n).write_bytes(gzip.decompress(base64.b64decode(pathlib.Path(s).read_text().strip()))) for n,s in zip(names,src)]"
          Push-Location 'v112src'
          git init | Out-Null
          foreach ($patch in @('..\v110.patch','..\slot-fix.patch','..\visibility-fix.patch','..\v111.patch')) {
            git apply --check $patch
            if ($LASTEXITCODE -ne 0) { throw "Patch check failed: $patch" }
            git apply $patch
            if ($LASTEXITCODE -ne 0) { throw "Patch apply failed: $patch" }
          }
          Pop-Location

      - name: Verify v1.0.11 baseline hash
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          import hashlib, pathlib
          root=pathlib.Path('v112src/GuidedArrow/Source')
          h=hashlib.sha256()
          for p in sorted(x for x in root.rglob('*') if x.is_file() and 'obj' not in x.parts and 'bin' not in x.parts):
              rel=p.relative_to(root).as_posix().encode('utf-8'); h.update(rel); h.update(b'\0'); h.update(p.read_bytes()); h.update(b'\0')
          digest=h.hexdigest(); print('v111_source_sha256='+digest)
          assert digest=='5feeb2ee96dc402c58da354c7d08b872bef7ce1d8829e2955b2b115bb809221a', digest
          '@ | Set-Content -Encoding UTF8 'verify_v111.py'
          python verify_v111.py

      - name: Apply exact v1.0.12 patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -c "import base64,gzip,pathlib,hashlib; p=pathlib.Path('GuidedArrow/v112-final.patch.gz.b64'); raw=gzip.decompress(base64.b64decode(p.read_text().strip())); d=hashlib.sha256(raw).hexdigest(); print('v112_patch_sha256='+d); assert d=='f94c435ca30696e71b7bf7b9df9d75c20405a294d8b6a3f9a454f270ef7c2ec3'; pathlib.Path('v112.patch').write_bytes(raw)"
          Push-Location 'v112src'
          git apply --check '..\v112.patch'
          if ($LASTEXITCODE -ne 0) { throw 'v1.0.12 patch check failed.' }
          git apply '..\v112.patch'
          if ($LASTEXITCODE -ne 0) { throw 'v1.0.12 patch apply failed.' }
          Pop-Location

      - name: Verify exact v1.0.12 source and semantics
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $project = Get-Content 'v112src/GuidedArrow/Source/GuidedArrow.csproj' -Raw
          $behavior = Get-Content 'v112src/GuidedArrow/Source/GuidedArrowBehavior.cs' -Raw
          $settings = Get-Content 'v112src/GuidedArrow/Source/Settings.cs' -Raw
          $submodule = Get-Content 'v112src/GuidedArrow/SubModule.xml' -Raw
          foreach ($needle in @('<Version>1.0.12</Version>','<FileVersion>1.0.12.0</FileVersion>','<AssemblyVersion>1.0.12.0</AssemblyVersion>')) { if (-not $project.Contains($needle)) { throw "Missing $needle" } }
          if (-not $submodule.Contains('<Version value="v1.0.12" />')) { throw 'SubModule.xml not v1.0.12.' }
          foreach ($needle in @('FindCandidateForShotSeed','OriginalShooter','PostImpactClassificationFrames','GetAdaptiveSteeringMultiplier','SlowTimeSteeringCompensation','ProximityMaximumExtraSlowdown','CinematicTimeRequestId','CinematicSubjectRecord','GetAdaptiveCinematicFraming','InitializeCinematicCamera','awaiting complete final kill confirmation set')) { if (-not ($behavior.Contains($needle) -or $settings.Contains($needle))) { throw "Missing semantic marker: $needle" } }
          if ($behavior.Contains('Math.Pow(1f / speedRatio')) { throw 'Old inverse-speed proximity compensation still present.' }
          if ($behavior.Contains('RemoveTrackedMissile(impactMissile, true);')) { throw 'Impact callback still removes missile immediately.' }
          @'
          import hashlib, pathlib
          root=pathlib.Path('v112src/GuidedArrow/Source')
          h=hashlib.sha256()
          for p in sorted(x for x in root.rglob('*') if x.is_file() and 'obj' not in x.parts and 'bin' not in x.parts):
              rel=p.relative_to(root).as_posix().encode('utf-8'); h.update(rel); h.update(b'\0'); h.update(p.read_bytes()); h.update(b'\0')
          digest=h.hexdigest(); pathlib.Path('source_hash.txt').write_text(digest+'\n'); print('v112_source_sha256='+digest)
          assert digest=='5b334b6ef84d792114d9190a64841636c3c1b5625c35df96babe939788b57131', digest
          '@ | Set-Content -Encoding UTF8 'verify_v112.py'
          python verify_v112.py

      - name: Restore
        shell: pwsh
        run: dotnet restore 'v112src/GuidedArrow/Source/GuidedArrow.csproj'

      - name: Build
        shell: pwsh
        run: |
          dotnet build 'v112src/GuidedArrow/Source/GuidedArrow.csproj' -c Release --no-restore 2>&1 | Tee-Object -FilePath 'compiler.log'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect exact outputs
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'compiled' | Out-Null
          if (Test-Path 'v112src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll') { Copy-Item 'v112src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll' 'compiled/GuidedArrow.dll' }
          if (Test-Path 'v112src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb') { Copy-Item 'v112src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb' 'compiled/GuidedArrow.pdb' }
          if (Test-Path 'v112src/GuidedArrow/Source') { Copy-Item 'v112src/GuidedArrow/Source' 'compiled/Source' -Recurse }
          if (Test-Path 'v112src/GuidedArrow/SubModule.xml') { Copy-Item 'v112src/GuidedArrow/SubModule.xml' 'compiled/SubModule.xml' }
          if (Test-Path 'compiler.log') { Copy-Item 'compiler.log' 'compiled/compiler.log' }
          if (Test-Path 'source_hash.txt') { Copy-Item 'source_hash.txt' 'compiled/source_hash.txt' }

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.12-compiled
          path: compiled
          if-no-files-found: warn
