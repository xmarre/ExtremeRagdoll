name: Apply v1.1.0 source update

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/apply-v1.1.0.yml
  pull_request:
    paths:
      - .apply-v1.1.0-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Verify and apply source patch
        run: |
          set -euo pipefail
          test "$(find .update-v1.1.0.parts -maxdepth 1 -type f | wc -l)" -eq 9
          cat .update-v1.1.0.parts/00 .update-v1.1.0.parts/01 .update-v1.1.0.parts/02 \
              .update-v1.1.0.parts/03 .update-v1.1.0.parts/04 .update-v1.1.0.parts/05 \
              .update-v1.1.0.parts/06 .update-v1.1.0.parts/07 .update-v1.1.0.parts/08 \
              | base64 --decode > /tmp/v1.1.0.patch
          echo '2c04b60dc6c937db1df78d9345f5ec577c6ca72a28265fa86ff5b3203f0d19cf  /tmp/v1.1.0.patch' | sha256sum --check
          git apply --check /tmp/v1.1.0.patch
          git apply /tmp/v1.1.0.patch
          grep -F '<Version value="v1.1.0" />' ExtremeRagdoll/SubModule.xml
          grep -F 'AssemblyVersion("1.1.0.0")' ExtremeRagdoll/Properties/AssemblyInfo.cs
          grep -F 'GlobalBoxMin' ExtremeRagdoll/ER_ImpulseRouter.cs
          ! grep -F 'ent.GetPhysicsBoundingBoxMin()' ExtremeRagdoll/ER_ImpulseRouter.cs

      - name: Remove temporary publication plumbing
        run: |
          set -euo pipefail
          rm -f .update-v1.1.0.patch.b64
          rm -rf .update-v1.1.0.parts
          rm -f .github/workflows/preserve-v1.0.1.yml
          rm -f .github/workflows/export-source.yml
          rm -f .github/workflows/export-roslyn.yml
          rm -f .github/workflows/export-build-dependencies.yml
          rm -f .github/workflows/apply-v1.1.0.yml

      - name: Commit source update
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'Update for Bannerlord 1.3.15 and TOR WiTM 1.16'
          git push origin HEAD:master
