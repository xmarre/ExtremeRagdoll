name: Temporary Guided Arrow v1.0.9 Compiler
on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.head_ref, 'tmp/guided-arrow-v109-')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Reconstruct and verify v1.0.9 source
        shell: pwsh
        run: |
          $parts = Get-ChildItem 'GuidedArrow/v109_payload/part*.txt' | Sort-Object Name
          if ($parts.Count -ne 5) { throw "Expected 5 source payload parts, found $($parts.Count)" }
          $expectedPartHashes = @(
            'ac5e38bed3a427059e24e2ffc45a8f2cc00858604dc682513d9a046bf0241590',
            'c6f48c3ffc4585fa286d7bcf2ed167737f80e758232bc67ba31cf152884b2b96',
            'f691f303a7c93c9ce8d9d30977e182aa7b58b7d58b71cb349a3d42e29744e8e9',
            '45d2392668f2a11cbb738c978fadb8e7a3a403ed292756ef1111d7c9c11c03da',
            'f35ca6bb3a108c97555b50d0ece15c5989342ffa4018c114cf5ca565b0bc71d5'
          )
          $b64 = ''
          for ($i = 0; $i -lt $parts.Count; $i++) {
            $partText = (Get-Content -Raw $parts[$i].FullName).Trim()
            $bytes = [Text.Encoding]::UTF8.GetBytes($partText)
            $sha = [BitConverter]::ToString([Security.Cryptography.SHA256]::Create().ComputeHash($bytes)).Replace('-','').ToLowerInvariant()
            if ($sha -ne $expectedPartHashes[$i]) { throw "Part $($i+1) hash mismatch: $sha" }
            $b64 += $partText
          }
          [IO.File]::WriteAllBytes('v109_source.zip', [Convert]::FromBase64String($b64))
          $archiveHash = (Get-FileHash 'v109_source.zip' -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "Source archive SHA-256: $archiveHash"
          if ($archiveHash -ne 'cb3c1237db829c8ee13631c4da91219f119fd299a9d8b8658eb3bdd0a246b21b') { throw "Source archive mismatch: $archiveHash" }
          Expand-Archive -Path 'v109_source.zip' -DestinationPath 'v109src' -Force
          $behaviorHash = (Get-FileHash 'v109src/GuidedArrow/Source/GuidedArrowBehavior.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          $settingsHash = (Get-FileHash 'v109src/GuidedArrow/Source/Settings.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "GuidedArrowBehavior.cs SHA-256: $behaviorHash"
          Write-Host "Settings.cs SHA-256: $settingsHash"
          if ($behaviorHash -ne '3f4431b24f271bf9ff922ed06563900f68d687e36a736ba886b8eef57fb24ccd') { throw "Controller mismatch: $behaviorHash" }
          if ($settingsHash -ne 'f732cd554df6bbe1426debfa3009aee93adb029da61c060d36691a74cea23b7d') { throw "Settings mismatch: $settingsHash" }
      - name: Restore
        shell: pwsh
        run: dotnet restore v109src/GuidedArrow/Source/GuidedArrow.csproj
      - name: Build
        id: compile
        continue-on-error: true
        shell: pwsh
        run: |
          & dotnet build v109src/GuidedArrow/Source/GuidedArrow.csproj -c Release --no-restore --nologo *> build.log
          $exitCode = $LASTEXITCODE
          Get-Content build.log
          if ($exitCode -ne 0) { 'BUILD_FAILED=1' | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.9-compiler-log
          path: build.log
      - name: Package
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        run: |
          $module = 'package/GuidedArrow'
          New-Item -ItemType Directory -Force "$module/bin/Win64_Shipping_Client" | Out-Null
          New-Item -ItemType Directory -Force "$module/Source" | Out-Null
          New-Item -ItemType Directory -Force "$module/GUI/Prefabs" | Out-Null
          Copy-Item v109src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll "$module/bin/Win64_Shipping_Client/"
          if (Test-Path v109src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb) { Copy-Item v109src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb "$module/bin/Win64_Shipping_Client/" }
          Copy-Item v109src/GuidedArrow/SubModule.xml $module/
          Copy-Item v109src/GuidedArrow/Source/*.cs "$module/Source/"
          Copy-Item v109src/GuidedArrow/Source/GuidedArrow.csproj "$module/Source/"
          Copy-Item v109src/GuidedArrow/GUI/Prefabs/*.xml "$module/GUI/Prefabs/"
          Compress-Archive -Path $module -DestinationPath GuidedArrow-v1.0.9-Bannerlord-1.3.15-Projectile-Axis-Visibility-Fix.zip -Force
      - name: Upload package
        if: env.BUILD_FAILED != '1'
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.9-Bannerlord-1.3.15-Projectile-Axis-Visibility-Fix
          path: GuidedArrow-v1.0.9-Bannerlord-1.3.15-Projectile-Axis-Visibility-Fix.zip
      - name: Fail on compiler errors
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: exit 1
