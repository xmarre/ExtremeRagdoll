name: Temporary Guided Arrow v1.0.10 Compiler

on:
  pull_request:
    paths:
      - 'GuidedArrow/.v110-compile-trigger'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Reconstruct v1.0.9 baseline
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parts = Get-ChildItem 'GuidedArrow/v109_payload/part*.txt' | Sort-Object Name
          if ($parts.Count -ne 5) { throw "Expected 5 baseline payload parts, found $($parts.Count)." }
          $encoded = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes('v109.zip', [Convert]::FromBase64String($encoded))
          Expand-Archive -Path 'v109.zip' -DestinationPath 'v110src' -Force

      - name: Verify v1.0.9 source hash
        shell: pwsh
        run: |
          @'
          import hashlib, pathlib, sys
          root = pathlib.Path(sys.argv[1])
          h = hashlib.sha256()
          for p in sorted(x for x in root.rglob('*') if x.is_file()):
              rel = p.relative_to(root).as_posix().encode('utf-8')
              h.update(rel); h.update(b'\0'); h.update(p.read_bytes()); h.update(b'\0')
          digest = h.hexdigest()
          print(digest)
          if digest.lower() != sys.argv[2].lower():
              raise SystemExit(f"source payload hash mismatch: {digest} != {sys.argv[2]}")
          '@ | Set-Content -Encoding UTF8 'verify_source.py'
          python verify_source.py 'v110src/GuidedArrow/Source' '02335ed46a7b949f715235f17ff2e3ec1de46fc46d40fa3dfb35112220e10b7a'

      - name: Decode and apply v1.0.10 patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -c "import base64,gzip,pathlib; p=pathlib.Path('GuidedArrow/v110.patch.gz.b64'); pathlib.Path('v110.patch').write_bytes(gzip.decompress(base64.b64decode(p.read_text().strip())))"
          Push-Location 'v110src'
          git init | Out-Null
          git apply --check '..\v110.patch'
          git apply '..\v110.patch'
          Pop-Location

      - name: Verify v1.0.10 source hash
        shell: pwsh
        run: python verify_source.py 'v110src/GuidedArrow/Source' '79fa7ca344604f106055f94fe5293e10b8407eb3c7ace0bf09b002b1114d1a97'

      - name: Restore
        shell: pwsh
        run: dotnet restore 'v110src/GuidedArrow/Source/GuidedArrow.csproj'

      - name: Build
        shell: pwsh
        run: |
          dotnet build 'v110src/GuidedArrow/Source/GuidedArrow.csproj' -c Release --no-restore 2>&1 | Tee-Object -FilePath 'compiler.log'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect outputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'compiled' | Out-Null
          Copy-Item 'v110src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll' 'compiled/GuidedArrow.dll'
          Copy-Item 'v110src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb' 'compiled/GuidedArrow.pdb'
          Copy-Item 'compiler.log' 'compiled/compiler.log'

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.10-compiled
          path: compiled
