name: Temporary Guided Arrow v1.0.10 Compiler

on:
  pull_request:
    paths:
      - 'GuidedArrow/.v110-compile-trigger'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Reconstruct exact v1.0.10 source
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parts = Get-ChildItem 'GuidedArrow/v110_payload/part*.txt' | Sort-Object Name
          if ($parts.Count -ne 5) { throw "Expected 5 v1.0.10 payload parts, found $($parts.Count)." }
          $encoded = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes('v110-source.zip', [Convert]::FromBase64String($encoded))
          Expand-Archive -Path 'v110-source.zip' -DestinationPath 'v110src' -Force

      - name: Verify exact v1.0.10 source payload
        shell: pwsh
        run: |
          @'
          import hashlib, pathlib, sys
          root = pathlib.Path(sys.argv[1])
          h = hashlib.sha256()
          for p in sorted(x for x in root.rglob('*') if x.is_file()):
              rel = p.relative_to(root).as_posix().encode('utf-8')
              h.update(rel); h.update(b'\0'); h.update(p.read_bytes()); h.update(b'\0')
          digest = h.hexdigest()
          print(digest)
          expected = sys.argv[2].lower()
          if digest.lower() != expected:
              raise SystemExit(f"source payload hash mismatch: {digest} != {expected}")
          '@ | Set-Content -Encoding UTF8 'verify_source.py'
          python verify_source.py 'v110src/GuidedArrow/Source' '79fa7ca344604f106055f94fe5293e10b8407eb3c7ace0bf09b002b1114d1a97'

      - name: Restore
        shell: pwsh
        run: dotnet restore 'v110src/GuidedArrow/Source/GuidedArrow.csproj'

      - name: Build
        shell: pwsh
        run: |
          dotnet build 'v110src/GuidedArrow/Source/GuidedArrow.csproj' -c Release --no-restore 2>&1 | Tee-Object -FilePath 'compiler.log'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect outputs
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'compiled' | Out-Null
          if (Test-Path 'v110src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll') { Copy-Item 'v110src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll' 'compiled/GuidedArrow.dll' }
          if (Test-Path 'v110src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb') { Copy-Item 'v110src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb' 'compiled/GuidedArrow.pdb' }
          if (Test-Path 'compiler.log') { Copy-Item 'compiler.log' 'compiled/compiler.log' }
          Get-ChildItem -Recurse 'compiled' | Select-Object FullName,Length

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.10-compiled
          path: compiled
          if-no-files-found: warn
