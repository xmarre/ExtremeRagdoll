name: Temporary Guided Arrow v1.0.4 Compiler
on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.head_ref, 'tmp/guided-arrow-v104-')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Reconstruct and patch source
        shell: pwsh
        run: |
          $parts = Get-ChildItem 'GuidedArrow/SourceParts/GuidedArrowBehavior.part*' | Sort-Object Name
          if ($parts.Count -ne 6) { throw "Expected 6 controller source parts, found $($parts.Count)" }
          $builder = New-Object System.Text.StringBuilder
          foreach ($part in $parts) {
            $text = [IO.File]::ReadAllText($part.FullName).Replace("`r`n", "`n")
            [void]$builder.Append($text)
          }
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          [IO.File]::WriteAllText('GuidedArrow/Source/GuidedArrowBehavior.cs', $builder.ToString(), $utf8)
          $baseHash = (Get-FileHash 'GuidedArrow/Source/GuidedArrowBehavior.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($baseHash -ne 'e7c2f2171c5ac30ac3f4dc8b0d46e175db21318c7f58d0b49fed3724b5a51ab6') { throw "Unexpected v1.0.3 source hash: $baseHash" }
          python GuidedArrow/apply_v104_patch.py
          $finalHash = (Get-FileHash 'GuidedArrow/Source/GuidedArrowBehavior.cs' -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($finalHash -ne 'eb707d35146d7a68cdb81d14aa6781c905f50ed6f5474eca0a667e51f1762dda') { throw "Unexpected v1.0.4 source hash: $finalHash" }
      - name: Restore
        shell: pwsh
        run: dotnet restore GuidedArrow/Source/GuidedArrow.csproj
      - name: Build
        id: compile
        continue-on-error: true
        shell: pwsh
        run: |
          & dotnet build GuidedArrow/Source/GuidedArrow.csproj -c Release --no-restore --nologo *> build.log
          $exitCode = $LASTEXITCODE
          Get-Content build.log
          if ($exitCode -ne 0) { 'BUILD_FAILED=1' | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.4-compiler-log
          path: build.log
      - name: Package
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        run: |
          $module = 'package/GuidedArrow'
          New-Item -ItemType Directory -Force "$module/bin/Win64_Shipping_Client" | Out-Null
          New-Item -ItemType Directory -Force "$module/Source" | Out-Null
          New-Item -ItemType Directory -Force "$module/GUI/Prefabs" | Out-Null
          Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll "$module/bin/Win64_Shipping_Client/"
          if (Test-Path GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb) { Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb "$module/bin/Win64_Shipping_Client/" }
          Copy-Item GuidedArrow/SubModule.xml $module/
          Copy-Item GuidedArrow/Source/*.cs $module/Source/
          Copy-Item GuidedArrow/Source/GuidedArrow.csproj $module/Source/
          Copy-Item GuidedArrow/GUI/Prefabs/*.xml "$module/GUI/Prefabs/"
          Compress-Archive -Path $module -DestinationPath GuidedArrow-v1.0.4-Bannerlord-1.3.15-Direct-Steering-Fix.zip -Force
      - name: Upload package
        if: env.BUILD_FAILED != '1'
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.4-Bannerlord-1.3.15-Direct-Steering-Fix
          path: GuidedArrow-v1.0.4-Bannerlord-1.3.15-Direct-Steering-Fix.zip
      - name: Fail on compiler errors
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: exit 1
