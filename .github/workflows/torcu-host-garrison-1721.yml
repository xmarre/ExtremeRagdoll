name: TORCU Temporary Host Garrison Fix Build

on:
  pull_request:
    branches: [master, main]

jobs:
  build:
    if: startsWith(github.head_ref, 'torcu-temp-host-garrison-1721')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Fetch source and build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/torcu
          curl -fL --retry 4 'https://raw.githubusercontent.com/xmarre/MapPerfFix/master/torcu-host-garrison-1721/TORCareerUniques.CompatibilityFixes.cs' -o /tmp/torcu/TORCareerUniques.CompatibilityFixes.cs
          cat > /tmp/torcu/TORCareerUniques.CompatibilityFixes.csproj <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework>
              <AssemblyName>TORCareerUniques.CompatibilityFixes</AssemblyName>
              <RootNamespace>TORCareerUniques.CompatibilityFixes</RootNamespace>
              <GenerateAssemblyInfo>false</GenerateAssemblyInfo>
              <LangVersion>latest</LangVersion>
              <Nullable>disable</Nullable>
              <ImplicitUsings>disable</ImplicitUsings>
              <Deterministic>true</Deterministic>
              <DebugType>portable</DebugType>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Bannerlord.ReferenceAssemblies.Core" Version="1.3.15.110062" PrivateAssets="all" />
              <PackageReference Include="Lib.Harmony" Version="2.3.3" PrivateAssets="all" />
            </ItemGroup>
          </Project>
          EOF
          dotnet restore /tmp/torcu/TORCareerUniques.CompatibilityFixes.csproj
          dotnet build /tmp/torcu/TORCareerUniques.CompatibilityFixes.csproj -c Release --no-restore
          test -f /tmp/torcu/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
          sha256sum /tmp/torcu/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
      - uses: actions/upload-artifact@v4
        with:
          name: TORCareerUniques-CompatibilityFixes-v1.7.21
          path: |
            /tmp/torcu/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
            /tmp/torcu/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.pdb
            /tmp/torcu/TORCareerUniques.CompatibilityFixes.cs
            /tmp/torcu/TORCareerUniques.CompatibilityFixes.csproj
          if-no-files-found: error
          retention-days: 1
