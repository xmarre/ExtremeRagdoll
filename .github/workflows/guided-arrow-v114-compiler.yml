name: Temporary Guided Arrow v1.0.15 Compiler

on:
  pull_request:
    paths:
      - 'GuidedArrow/.v115-compile-trigger'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Reconstruct exact v1.0.14 source baseline
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parts = Get-ChildItem 'GuidedArrow/v109_payload/part*.txt' | Sort-Object Name
          if ($parts.Count -ne 5) { throw "Expected 5 v1.0.9 payload parts, found $($parts.Count)." }
          $encoded = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes('v109.zip', [Convert]::FromBase64String($encoded))
          Expand-Archive -Path 'v109.zip' -DestinationPath 'v115src' -Force
          python -c "import base64,gzip,pathlib; names=['v110.patch','slot-fix.patch','visibility-fix.patch','v111.patch']; src=['GuidedArrow/v110.patch.gz.b64','GuidedArrow/v110-slot-fix.patch.gz.b64','GuidedArrow/v110-public-visibility-fix.patch.gz.b64','GuidedArrow/v111.patch.gz.b64']; [pathlib.Path(n).write_bytes(gzip.decompress(base64.b64decode(pathlib.Path(s).read_text().strip()))) for n,s in zip(names,src)]"
          Push-Location 'v115src'
          git init | Out-Null
          foreach ($patch in @('..\v110.patch','..\slot-fix.patch','..\visibility-fix.patch','..\v111.patch')) {
            git apply --check $patch
            if ($LASTEXITCODE -ne 0) { throw "Patch check failed: $patch" }
            git apply $patch
            if ($LASTEXITCODE -ne 0) { throw "Patch apply failed: $patch" }
          }
          Pop-Location
          @'
          import base64,gzip,hashlib,pathlib
          parts=sorted(pathlib.Path('GuidedArrow/v112_payload').glob('part*.txt'))
          encoded=''.join(p.read_text().strip() for p in parts)
          assert len(parts)==4
          assert hashlib.sha256(encoded.encode()).hexdigest()=='09f3869fb3e7eb26e64840d72806bf73f9ec4e607472f85d7506a61c4df535ed'
          raw=gzip.decompress(base64.b64decode(encoded))
          assert hashlib.sha256(raw).hexdigest()=='f94c435ca30696e71b7bf7b9df9d75c20405a294d8b6a3f9a454f270ef7c2ec3'
          pathlib.Path('v112.patch').write_bytes(raw)
          '@ | Set-Content -Encoding UTF8 reconstruct_v112.py
          python reconstruct_v112.py
          Push-Location 'v115src'
          git apply --check '..\v112.patch'; if ($LASTEXITCODE -ne 0) { throw 'v112 patch check failed' }
          git apply '..\v112.patch'; if ($LASTEXITCODE -ne 0) { throw 'v112 patch apply failed' }
          Pop-Location
          @'
          import base64,gzip,hashlib,pathlib
          parts=sorted(pathlib.Path('GuidedArrow/v113_payload').glob('part*.txt'))
          encoded=''.join(p.read_text().strip() for p in parts)
          assert len(parts)==2
          assert hashlib.sha256(encoded.encode()).hexdigest()=='732359dbafb7fe1c246f13e3e8e8829c955f059ce8f96eda72e57c75d9779193'
          raw=gzip.decompress(base64.b64decode(encoded))
          assert hashlib.sha256(raw).hexdigest()=='ba6a37e0b3816536e4a38d667c2dbbdcff4c0aeb1bb20bf6e9da2284b020504e'
          pathlib.Path('v113.patch').write_bytes(raw)
          '@ | Set-Content -Encoding UTF8 reconstruct_v113.py
          python reconstruct_v113.py
          Push-Location 'v115src'
          git apply --check '..\v113.patch'; if ($LASTEXITCODE -ne 0) { throw 'v113 patch check failed' }
          git apply '..\v113.patch'; if ($LASTEXITCODE -ne 0) { throw 'v113 patch apply failed' }
          Pop-Location
          @'
          import base64,gzip,hashlib,pathlib
          paths=[pathlib.Path('GuidedArrow/v114c_payload/part01.txt'),pathlib.Path('GuidedArrow/v114c_payload/part02.txt'),pathlib.Path('GuidedArrow/v114c_payload/part03.txt'),pathlib.Path('GuidedArrow/v114d_payload/part04.txt'),pathlib.Path('GuidedArrow/v114d_payload/part05.txt'),pathlib.Path('GuidedArrow/v114d_payload/part06.txt'),pathlib.Path('GuidedArrow/v114d_payload/part07.txt')]
          encoded=''.join(p.read_text().strip() for p in paths)
          assert hashlib.sha256(encoded.encode()).hexdigest()=='e72d17d47496ae93b122aea6a84696cbf206c96423fa3022f3b69d3cc8659b3a'
          raw=gzip.decompress(base64.b64decode(encoded))
          assert hashlib.sha256(raw).hexdigest()=='b6e9997f36f1f8021e3d68a752030c6658f5665569ce4abc97fe4104574abef5'
          pathlib.Path('v114.patch').write_bytes(raw)
          '@ | Set-Content -Encoding UTF8 reconstruct_v114.py
          python reconstruct_v114.py
          Push-Location 'v115src'
          git apply --check '..\v114.patch'; if ($LASTEXITCODE -ne 0) { throw 'v114 patch check failed' }
          git apply '..\v114.patch'; if ($LASTEXITCODE -ne 0) { throw 'v114 patch apply failed' }
          Pop-Location
          $submodulePath='v115src/GuidedArrow/SubModule.xml'
          $text=[IO.File]::ReadAllText($submodulePath).Replace('v1.0.13','v1.0.14')
          [IO.File]::WriteAllText($submodulePath,$text,[Text.UTF8Encoding]::new($false))

      - name: Verify exact v1.0.14 baseline hash
        shell: pwsh
        run: |
          @'
          import hashlib,pathlib
          root=pathlib.Path('v115src/GuidedArrow/Source'); h=hashlib.sha256()
          for p in sorted(x for x in root.rglob('*') if x.is_file() and 'obj' not in x.parts and 'bin' not in x.parts):
              rel=p.relative_to(root).as_posix().encode(); h.update(rel); h.update(b'\0'); h.update(p.read_bytes()); h.update(b'\0')
          digest=h.hexdigest(); print('v114_source_sha256='+digest); assert digest=='629df15230c7075387be1759b31387a4ada8594ee59d5f8e763dafa7575592a5'
          '@ | Set-Content -Encoding UTF8 verify_v114.py
          python verify_v114.py

      - name: Reconstruct and apply exact v1.0.15 patch
        shell: pwsh
        run: |
          @'
          import base64,gzip,hashlib,pathlib
          parts=sorted(pathlib.Path('GuidedArrow/v115_payload').glob('part*.txt'))
          encoded=''.join(p.read_text().strip() for p in parts)
          assert len(parts)==4, len(parts)
          eh=hashlib.sha256(encoded.encode()).hexdigest(); print('v115_encoded_sha256='+eh); assert eh=='5fc3606bddd34659e48e13820f7fe89e4e21bd335a05929f9d388c4e819408b5'
          raw=gzip.decompress(base64.b64decode(encoded))
          rh=hashlib.sha256(raw).hexdigest(); print('v115_patch_sha256='+rh); assert rh=='cc23f5084c6a1b300c9e6f2a1e177d482869b159db5fbea87170bc62ae005e5f'
          pathlib.Path('v115.patch').write_bytes(raw)
          '@ | Set-Content -Encoding UTF8 reconstruct_v115.py
          python reconstruct_v115.py
          Push-Location 'v115src'
          git apply --check '..\v115.patch'; if ($LASTEXITCODE -ne 0) { throw 'v115 patch check failed' }
          git apply '..\v115.patch'; if ($LASTEXITCODE -ne 0) { throw 'v115 patch apply failed' }
          Pop-Location
          $submodulePath='v115src/GuidedArrow/SubModule.xml'
          $text=[IO.File]::ReadAllText($submodulePath).Replace('v1.0.14','v1.0.15')
          [IO.File]::WriteAllText($submodulePath,$text,[Text.UTF8Encoding]::new($false))

      - name: Verify exact v1.0.15 source and semantics
        shell: pwsh
        run: |
          $project=Get-Content 'v115src/GuidedArrow/Source/GuidedArrow.csproj' -Raw
          $behavior=Get-Content 'v115src/GuidedArrow/Source/GuidedArrowBehavior.cs' -Raw
          $submodule=Get-Content 'v115src/GuidedArrow/SubModule.xml' -Raw
          foreach($needle in @('<Version>1.0.15</Version>','<FileVersion>1.0.15.0</FileVersion>','<AssemblyVersion>1.0.15.0</AssemblyVersion>')) { if(-not $project.Contains($needle)){throw "Missing $needle"} }
          if(-not $submodule.Contains('<Version value="v1.0.15" />')){throw 'SubModule not v1.0.15'}
          foreach($needle in @('SplitSiblingAcquireWindow','NativeSplitBatchCaptured','Ignored normal missile callback while guided-shot generation','ActivateVictimCameraPreview','CameraLeaderTerminalImpact','record.ConfirmedKill')) { if(-not $behavior.Contains($needle)){throw "Missing semantic marker $needle"} }
          if($behavior.Contains('AddPendingShotSeed(shooterAgent, _activeShotGeneration, forcedMissileIndex, position, velocity);\r\n                    TryAcquireMissiles();')){throw 'Active callback injection path still present'}
          @'
          import hashlib,pathlib
          root=pathlib.Path('v115src/GuidedArrow/Source'); h=hashlib.sha256()
          for p in sorted(x for x in root.rglob('*') if x.is_file() and 'obj' not in x.parts and 'bin' not in x.parts):
              rel=p.relative_to(root).as_posix().encode(); h.update(rel); h.update(b'\0'); h.update(p.read_bytes()); h.update(b'\0')
          digest=h.hexdigest(); print('v115_source_sha256='+digest); pathlib.Path('source_hash.txt').write_text(digest+'\n'); assert digest=='ece069211f0e4ddb0526a3bdf51eabde1f6fd58857d4e345c483dbf7060401e4'
          '@ | Set-Content -Encoding UTF8 verify_v115.py
          python verify_v115.py

      - name: Restore
        shell: pwsh
        run: dotnet restore 'v115src/GuidedArrow/Source/GuidedArrow.csproj'

      - name: Build
        shell: pwsh
        run: |
          dotnet build 'v115src/GuidedArrow/Source/GuidedArrow.csproj' -c Release --no-restore 2>&1 | Tee-Object -FilePath compiler.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect exact outputs
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force compiled | Out-Null
          if(Test-Path 'v115src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll'){Copy-Item 'v115src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll' 'compiled/GuidedArrow.dll'}
          if(Test-Path 'v115src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb'){Copy-Item 'v115src/GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb' 'compiled/GuidedArrow.pdb'}
          if(Test-Path 'v115src/GuidedArrow/Source'){Copy-Item 'v115src/GuidedArrow/Source' 'compiled/Source' -Recurse}
          if(Test-Path 'v115src/GuidedArrow/SubModule.xml'){Copy-Item 'v115src/GuidedArrow/SubModule.xml' 'compiled/SubModule.xml'}
          if(Test-Path compiler.log){Copy-Item compiler.log compiled/compiler.log}
          if(Test-Path source_hash.txt){Copy-Item source_hash.txt compiled/source_hash.txt}

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.15-compiled
          path: compiled
          if-no-files-found: warn
