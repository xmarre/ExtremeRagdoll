name: Temporary Guided Arrow v1.0.2 Compiler
on:
  pull_request:
    branches: [ master ]

permissions:
  actions: read
  contents: read

jobs:
  build:
    if: startsWith(github.head_ref, 'tmp/guided-arrow-v102-')
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Materialize and patch v1.0.1 source
        shell: pwsh
        run: |
          curl.exe -fL `
            -H "Authorization: Bearer $env:GITHUB_TOKEN" `
            -H "X-GitHub-Api-Version: 2022-11-28" `
            -o v101-artifact.zip `
            "https://api.github.com/repos/xmarre/ExtremeRagdoll/actions/artifacts/8574759759/zip"
          Expand-Archive v101-artifact.zip -DestinationPath v101-artifact -Force
          $inner = Get-ChildItem v101-artifact -Filter '*.zip' -Recurse | Select-Object -First 1
          if ($null -eq $inner) { throw 'v1.0.1 package ZIP not found in artifact' }
          Expand-Archive $inner.FullName -DestinationPath source -Force
          Move-Item source/GuidedArrow GuidedArrow
          python .tmp/apply_v102_patch.py
      - name: Restore
        shell: pwsh
        run: dotnet restore GuidedArrow/Source/GuidedArrow.csproj
      - name: Build
        id: compile
        continue-on-error: true
        shell: pwsh
        run: |
          & dotnet build GuidedArrow/Source/GuidedArrow.csproj -c Release --no-restore --nologo *> build.log
          $exitCode = $LASTEXITCODE
          Get-Content build.log
          if ($exitCode -ne 0) { 'BUILD_FAILED=1' | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.2-compiler-log
          path: build.log
      - name: Package
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        run: |
          $module = 'package/GuidedArrow'
          New-Item -ItemType Directory -Force "$module/bin/Win64_Shipping_Client" | Out-Null
          New-Item -ItemType Directory -Force "$module/Source" | Out-Null
          Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll "$module/bin/Win64_Shipping_Client/"
          if (Test-Path GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb) { Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb "$module/bin/Win64_Shipping_Client/" }
          Copy-Item GuidedArrow/SubModule.xml $module/
          Copy-Item GuidedArrow/*.txt $module/
          Copy-Item GuidedArrow/Source/*.cs $module/Source/
          Copy-Item GuidedArrow/Source/GuidedArrow.csproj $module/Source/
          Compress-Archive -Path $module -DestinationPath GuidedArrow-v1.0.2-Bannerlord-1.3.15-Custom-Camera-Fix.zip -Force
      - name: Upload package
        if: env.BUILD_FAILED != '1'
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.2-Bannerlord-1.3.15-Custom-Camera-Fix
          path: GuidedArrow-v1.0.2-Bannerlord-1.3.15-Custom-Camera-Fix.zip
      - name: Fail on compiler errors
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: exit 1
