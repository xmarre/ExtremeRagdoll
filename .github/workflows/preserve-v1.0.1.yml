name: Preserve legacy v1.0.1

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/preserve-v1.0.1.yml

permissions:
  contents: write

jobs:
  preserve:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Create legacy tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          LEGACY_SHA: 53f21cc17b038fd22a39219b63e5d87559d98f67
        run: |
          set -euo pipefail
          if ! gh release view v1.0.1 --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release create v1.0.1 \
              --repo "$REPOSITORY" \
              --target "$LEGACY_SHA" \
              --title "Extreme Ragdoll v1.0.1 (legacy)" \
              --notes "Preserved source snapshot of the last pre-Bannerlord-1.3.15 version. Tag target: $LEGACY_SHA. This release keeps the Bannerlord 1.2.12-era implementation available before the 1.3.15 / The Old Realms: War in the Mountains 1.16 update."
          fi
          test "$(gh api "repos/$REPOSITORY/git/ref/tags/v1.0.1" --jq .object.sha)" = "$LEGACY_SHA"

      - name: Record successful preservation
        env:
          LEGACY_SHA: 53f21cc17b038fd22a39219b63e5d87559d98f67
        run: |
          set -euo pipefail
          mkdir -p .release-status
          printf 'tag=v1.0.1\ntarget=%s\nrelease=https://github.com/%s/releases/tag/v1.0.1\n' "$LEGACY_SHA" "$GITHUB_REPOSITORY" > .release-status/v1.0.1.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .release-status/v1.0.1.txt
          git commit -m "Record v1.0.1 preservation"
          git push origin HEAD:master
