name: Temporary Bannerlord API Probe
on:
  pull_request:
    branches: [ master ]

jobs:
  probe:
    if: startsWith(github.head_ref, 'tmp/guided-arrow-v107-')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        shell: pwsh
        run: dotnet restore ApiProbe/ApiProbe.csproj
      - name: Build
        shell: pwsh
        run: dotnet build ApiProbe/ApiProbe.csproj -c Release --no-restore --nologo
      - name: Run probe
        continue-on-error: true
        shell: pwsh
        run: |
          & ApiProbe/bin/Release/net472/ApiProbe.exe *> api-probe.txt
          Get-Content api-probe.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bannerlord-api-probe
          path: api-probe.txt
