name: Temporary Guided Arrow v1.0.1 Compiler
on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.head_ref, 'tmp/guided-arrow-v101-')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Materialize source
        shell: pwsh
        run: |
          if (-not (Test-Path '.tmp/guided-arrow-v101-src.b64')) { throw 'Missing source payload' }
          [IO.File]::WriteAllBytes('guided-arrow-v101-src.tar.gz', [Convert]::FromBase64String((Get-Content -Raw '.tmp/guided-arrow-v101-src.b64')))
          tar -xzf guided-arrow-v101-src.tar.gz
      - name: Add mission-view reference
        shell: pwsh
        run: |
          $path = 'GuidedArrow/Source/GuidedArrow.csproj'
          $text = [IO.File]::ReadAllText($path)
          $text = $text.Replace(
            '    <PackageReference Include="Bannerlord.ReferenceAssemblies.Core" Version="1.3.15.110062" />',
            "    <PackageReference Include=\"Bannerlord.ReferenceAssemblies.Core\" Version=\"1.3.15.110062\" />`r`n    <PackageReference Include=\"Bannerlord.ReferenceAssemblies.Native\" Version=\"1.3.15.110062\" PrivateAssets=\"All\" />")
          $reference = @'
  <ItemGroup>
    <Reference Include="TaleWorlds.MountAndBlade.View">
      <HintPath>$(NuGetPackageRoot)bannerlord.referenceassemblies.native\1.3.15.110062\ref\net472\TaleWorlds.MountAndBlade.View.dll</HintPath>
      <Private>false</Private>
    </Reference>
  </ItemGroup>
'@
          $text = $text.Replace('</Project>', $reference + '</Project>')
          [IO.File]::WriteAllText($path, $text, [Text.UTF8Encoding]::new($false))
      - name: Restore
        shell: pwsh
        run: dotnet restore GuidedArrow/Source/GuidedArrow.csproj
      - name: Build
        id: compile
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet build GuidedArrow/Source/GuidedArrow.csproj -c Release --no-restore --nologo 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { "BUILD_FAILED=1" | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.1-compiler-log
          path: build.log
      - name: Package
        if: env.BUILD_FAILED != '1'
        shell: pwsh
        run: |
          $module = 'package/GuidedArrow'
          New-Item -ItemType Directory -Force "$module/bin/Win64_Shipping_Client" | Out-Null
          New-Item -ItemType Directory -Force "$module/Source" | Out-Null
          Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.dll "$module/bin/Win64_Shipping_Client/"
          if (Test-Path GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb) { Copy-Item GuidedArrow/Source/bin/Release/net472/GuidedArrow.pdb "$module/bin/Win64_Shipping_Client/" }
          Copy-Item GuidedArrow/SubModule.xml $module/
          Copy-Item GuidedArrow/*.txt $module/
          Copy-Item GuidedArrow/Source/*.cs $module/Source/
          Copy-Item GuidedArrow/Source/GuidedArrow.csproj $module/Source/
          Compress-Archive -Path $module -DestinationPath GuidedArrow-v1.0.1-Bannerlord-1.3.15-Camera-Time-Fix.zip -Force
      - name: Upload package
        if: env.BUILD_FAILED != '1'
        uses: actions/upload-artifact@v4
        with:
          name: GuidedArrow-v1.0.1-Bannerlord-1.3.15-Camera-Time-Fix
          path: GuidedArrow-v1.0.1-Bannerlord-1.3.15-Camera-Time-Fix.zip
      - name: Fail on compiler errors
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: exit 1
