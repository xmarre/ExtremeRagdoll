name: TORCU Compiler Probe

on:
  pull_request:
    branches: [ master ]

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - name: Probe NuGet and Nexus source access
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          "--- exact NuGet installs ---" | Out-File probe.txt -Encoding utf8
          nuget install Bannerlord.ReferenceAssemblies -Version 1.3.15.110062 -Source https://api.nuget.org/v3/index.json -OutputDirectory packages -NonInteractive 2>&1 | Add-Content probe.txt
          "refs_exit=$LASTEXITCODE" | Add-Content probe.txt
          nuget install Bannerlord.MCM -Version 5.12.1 -Source https://api.nuget.org/v3/index.json -OutputDirectory packages -NonInteractive 2>&1 | Add-Content probe.txt
          "mcm_exit=$LASTEXITCODE" | Add-Content probe.txt
          "`n--- Nexus files page ---" | Add-Content probe.txt
          try {
            Invoke-WebRequest -UseBasicParsing -Headers @{ 'User-Agent'='Mozilla/5.0' } -Uri 'https://www.nexusmods.com/mountandblade2bannerlord/mods/12134?tab=files' -OutFile nexus-files.html
            "nexus_status=ok bytes=$((Get-Item nexus-files.html).Length)" | Add-Content probe.txt
            Select-String -Path nexus-files.html -Pattern '1.7.13|file_id|Manual download|TOR_Career|download' | Select-Object -First 150 | ForEach-Object { $_.Line } | Add-Content probe.txt
          } catch {
            "nexus_error=$($_.Exception.Message)" | Add-Content probe.txt
          }
          Get-ChildItem packages -Recurse -File -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName | Add-Content probe.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: torcu-compiler-probe
          path: |
            probe.txt
            nexus-files.html
          if-no-files-found: ignore
