name: TORCU Compiler Probe

on:
  pull_request:
    branches: [ master ]

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - name: Build portable compiler bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force bundle | Out-Null
          nuget install Microsoft.Net.Compilers.Toolset -Version 4.8.0 -Source https://api.nuget.org/v3/index.json -OutputDirectory packages -NonInteractive
          nuget install Bannerlord.ReferenceAssemblies.Core -Version 1.3.15.110062 -Source https://api.nuget.org/v3/index.json -OutputDirectory packages -NonInteractive
          nuget install Bannerlord.MCM -Version 5.12.1 -Source https://api.nuget.org/v3/index.json -OutputDirectory packages -NonInteractive
          nuget install NETStandard.Library -Version 2.0.3 -Source https://api.nuget.org/v3/index.json -OutputDirectory packages -NonInteractive
          curl.exe -L --fail-with-body "https://builds.dotnet.microsoft.com/dotnet/Runtime/8.0.22/dotnet-runtime-8.0.22-linux-x64.tar.gz" -o bundle/dotnet-runtime-8.0.22-linux-x64.tar.gz
          Copy-Item -Recurse packages/Microsoft.Net.Compilers.Toolset.4.8.0/tasks/netcore/bincore bundle/roslyn
          Copy-Item -Recurse packages/Bannerlord.ReferenceAssemblies.Core.1.3.15.110062/ref/netstandard2.0 bundle/bannerlord
          Copy-Item packages/Bannerlord.MCM.5.12.1/lib/netstandard2.0/MCMv5.dll bundle/MCMv5.dll
          Copy-Item -Recurse packages/NETStandard.Library.2.0.3/build/netstandard2.0/ref bundle/netstandard
          Get-ChildItem bundle -Recurse -File | Select-Object FullName,Length | Format-Table -AutoSize | Out-File bundle/manifest.txt -Encoding utf8
      - uses: actions/upload-artifact@v4
        with:
          name: torcu-portable-compiler
          path: bundle
          compression-level: 6
